    <h1>Biryani</h1>
    <img src=" https://th.bing.com/th/id/OIP.F9WbPr1MDWQ2X6EMRIFPPgHaHa?w=204&h=203&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3" alt="Biyani in bowl on top of chicken peices" width="400" height="300">
    <h2>Ingredients</h2>
    <ol>
        <li>1 cup basmati rice</li>
        <li>2 tbsp ghee</li>
        <li>1 large onion, sliced</li>
        <li>2 tbsp ginger-garlic paste</li>
        <li>1 cup yogurt</li>
        <li>1 tsp cumin seeds</li>
        <li>1 tsp coriander powder</li>
        <li>1/2 tsp turmeric powder</li>
        <li>1 tsp red chili powder</li>
        <li>Salt to taste</li>
    </ol>
